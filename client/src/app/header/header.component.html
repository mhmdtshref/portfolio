<header>
  <div id="description-container">
    <h1>{{data.name}}</h1>
    <h3>{{data.jobTitle}}</h3>
    <p>{{data.description}}</p>
  </div>
  <div id="socials-container">
      <app-social *ngFor="let item of socialsList | slice:0:4;" [imageUrl]="item.iconUrl" [socialLink]="item.link"></app-social>
  </div>
</header>
