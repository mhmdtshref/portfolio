<header>
  <div id="right-side">
    <h1>{{data.name}}</h1>
    <h3>{{data.jobTitle}}</h3>
    <p>{{data.description}}</p>
  </div>
  <div id="socials-container">
      <app-social *ngFor="let item of socialsList()" [imageUrl]="item.imageUrl" [socialLink]="item.socialLink"></app-social>
  </div>
</header>
