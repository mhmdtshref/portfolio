<div id="view-service-page">
    <div id="page-content">
        <div id="title-container">
            <h1>{{service.name}}</h1>
        </div>
        <div id="details-list-container">
            <div class="detail-container" *ngFor="let serviceKey of serviceKeys">
                <h3>{{toRegularString(serviceKey)}}</h3>
                <input [(ngModel)]="service[serviceKey]" disabled>
            </div>
        </div>
        <div id="controls-container">
            <i class="far fa-trash-alt delete-icon" (click)="onClickDeleteButton()"></i>
            <i class="far fa-edit edit-icon" (click)="onClickEditButton()"></i>
        </div>
    </div>
</div>
<app-pop-up *ngIf="deleteClicked" title="Confirm Project Delete" message="Are you sure you want to delete the project: {{service.name}}?" greenButton="Keep" redButton="Delete" [action]="deleteAction">
</app-pop-up>
